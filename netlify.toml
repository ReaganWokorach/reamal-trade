# =============================================================
# REAMAL Trade — Netlify Configuration
# =============================================================
# This file tells Netlify exactly how to build and serve
# your website. Do not rename or move this file — it must
# stay in the root of your project.
# =============================================================

[build]
  # Folder where your HTML, CSS, and JS files live
  publish = "public"

  # Folder where your serverless functions live
  functions = "netlify/functions"

  # No build command needed — pure HTML/CSS/JS site
  command = ""


# =============================================================
# FUNCTION SETTINGS
# =============================================================

[functions]
  # Node.js version for Netlify Functions
  node_bundler = "esbuild"


# =============================================================
# REDIRECTS & API ROUTING
# =============================================================
# These rules redirect all /.netlify/functions/* calls
# correctly so your frontend JS can talk to your functions.

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

# Catch-all: serve index.html for any unknown route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


# =============================================================
# SECURITY & PERFORMANCE HEADERS
# =============================================================

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Allow large image uploads (chart screenshots)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com;"

[[headers]]
  for = "/css/*"
  [headers.values]
    # Cache CSS for 1 day
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    # Cache JS for 1 day
    Cache-Control = "public, max-age=86400"


# =============================================================
# ENVIRONMENT VARIABLES (Non-secret defaults only)
# =============================================================
# Secret keys like ANTHROPIC_API_KEY must be set in:
# Netlify Dashboard → Site Settings → Environment Variables
# Never put real API keys in this file!
# =============================================================

[context.production.environment]
  CLAUDE_MODEL = "claude-sonnet-4-20250514"
  MAX_TOKENS = "1500"
  DEFAULT_ACCOUNT_BALANCE = "100"
  MAX_RISK_PERCENT = "2"

[context.deploy-preview.environment]
  CLAUDE_MODEL = "claude-sonnet-4-20250514"
  MAX_TOKENS = "1500"
  DEFAULT_ACCOUNT_BALANCE = "100"
  MAX_RISK_PERCENT = "2"
